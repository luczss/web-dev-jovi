<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GRUPO FOCO — Login</title>
  <link rel="stylesheet" href="../src/css/estilo.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <a href="../index.html" class="back-link">← Voltar ao site</a>
      <div class="login-logo">GRUPO FOCO<span class="dot">.</span></div>
      <p>Acesse sua conta</p>
    </div>

    <!-- DICA DE CREDENCIAIS -->
    <div class="demo-hint">
      <span class="demo-hint-label">Acesso de demonstração</span>
      <p><strong>E-mail:</strong> admin@gmail.com</p>
      <p><strong>Senha:</strong> admin123</p>
    </div>

    <!-- LOGIN -->
    <div id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" oninput="clearError('loginEmail')" />
        <span class="field-error" id="loginEmail-error"></span>
      </div>
      <div class="form-group">
        <label for="loginPassword">Senha</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Sua senha" oninput="clearError('loginPassword')" />
          <button class="show-pass" onclick="togglePassword('loginPassword', this)" type="button">👁</button>
        </div>
        <span class="field-error" id="loginPassword-error"></span>
      </div>
      <div class="form-options">
        <label class="remember-label">
          <input type="checkbox" id="rememberMe" /> Lembrar de mim
        </label>
        <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Esqueci minha senha</a>
      </div>
      <button class="btn-primary btn-full" onclick="submitLogin()">Entrar na GRUPO FOCO</button>
    </div>
  </div>

  <!-- Tela de sucesso -->
  <div id="loginSuccess" class="login-success hidden">
    <div class="success-card">
      <div class="success-anim">✓</div>
      <h2>Bem-vindo ao GRUPO FOCO!</h2>
      <p>Login realizado com sucesso. Redirecionando...</p>
      <div class="redirect-bar">
        <div class="redirect-fill" id="redirectFill"></div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <style>
    .demo-hint {
      background: rgba(26,74,46,0.07);
      border: 1px solid rgba(26,74,46,0.18);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--text2);
    }
    .demo-hint-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .demo-hint p { margin: 0.15rem 0; }
    .demo-hint strong { color: var(--text); }
  </style>

  <script>
    /* ── utilidades ── */
    function clearError(id) {
      const el = document.getElementById(id);
      const err = document.getElementById(id + '-error');
      if (el)  el.classList.remove('error');
      if (err) err.textContent = '';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      const err = document.getElementById(id + '-error');
      if (el)  el.classList.add('error');
      if (err) err.textContent = msg;
    }

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    /* ── login ── */
    function submitLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      let valid = true;

      if (!email) {
        showError('loginEmail', 'Informe seu e-mail.');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('loginEmail', 'E-mail inválido.');
        valid = false;
      }

      if (!password) {
        showError('loginPassword', 'Informe sua senha.');
        valid = false;
      }

      if (!valid) return;

      /* credenciais de exemplo */
      if (email === 'admin@gmail.com' && password === 'admin123') {
        const successEl = document.getElementById('loginSuccess');
        successEl.classList.remove('hidden');
        setTimeout(() => {
          const fill = document.getElementById('redirectFill');
          if (fill) fill.style.width = '100%';
        }, 100);
        setTimeout(() => {
          window.location.href = '../index.html';
        }, 3200);
      } else {
        showError('loginEmail', ' ');
        showError('loginPassword', 'E-mail ou senha incorretos.');
      }
    }

    /* ── esqueci senha ── */
    function showForgotPassword(e) {
      e.preventDefault();
      document.getElementById('modal-body').innerHTML = `
        <h3>Recuperar senha</h3>
        <p>Esta é uma versão de demonstração. Use as credenciais de exemplo para acessar:</p>
        <p><strong>E-mail:</strong> admin@gmail.com<br><strong>Senha:</strong> admin123</p>
      `;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }
  </script>
</body>
</html>
